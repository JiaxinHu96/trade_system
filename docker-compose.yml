services:
  db:
    image: postgres:16
    container_name: trade-system-db
    environment:
      POSTGRES_DB: trade_journal
      POSTGRES_USER: trade_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_user -d trade_journal"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data: